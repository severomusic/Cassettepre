name: Build Plugin

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-13
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install JUCE
      run: |
        git clone https://github.com/juce-framework/JUCE.git ~/JUCE --depth 1

    - name: Configure CMake
      run: |
        cmake -B Build -G Xcode \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
          -DJUCE_PATH=~/JUCE \
          -S .

    - name: Build VST3
      run: |
        cmake --build Build --config Release

    - name: Upload VST3
      uses: actions/upload-artifact@v4
      with:
        name: Cassettepreamp-VST3
        path: Build/**/*.vst3
